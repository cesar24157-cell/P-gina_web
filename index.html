<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vida Saludable & Lavandas</title>
    <style>
        /* Estilos Generales */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0fdf4; 
            color: #2d3748; 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            margin: 0;
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 850px; 
        }

        /* Control de Secciones */
        #seccion-contenido { display: none; } 

        /* Estilos de la Tabla */
        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; background: #faf5ff; }
        th, td { border: 1px solid #e9d8fd; padding: 15px; text-align: left; }
        th { background-color: #805ad5; color: white; text-transform: uppercase; font-size: 14px; }
        tr:hover { background-color: #f3e8ff; }
        
        /* Estilos Formulario */
        h2 { color: #2f855a; margin-top: 0; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #cbd5e0; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px;
        }
        button { 
            background-color: #48bb78; 
            color: white; 
            border: none; 
            padding: 14px; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 18px; 
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover { background-color: #38a169; }
